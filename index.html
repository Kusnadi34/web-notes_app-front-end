<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    
    <title>Notes App</title>
    
    
  </head>
  
  <body>
    <awesome-component></awesome-component>
    <custom-header></custom-header>
    
    <main>
      <div class="container">
        <section class="add-note-section">
          <h2 class="title-section">
            <i class="fas fa-plus-circle"></i> Add New Note
          </h2>
          
          <form id="addNoteForm" class="card note-form">
            <div class="form-group">
              <label for="noteTitle">
                <i class="fas fa-heading"></i> Title
              </label>
              <input 
                type="text" 
                id="noteTitle" 
                placeholder="Enter note title..." 
                required
                maxlength="100"
              >
              <div class="validation-message" id="titleValidation"></div>
            </div>
            
            <div class="form-group">
              <label for="noteContent">
                <i class="fas fa-edit"></i> Content
              </label>
              <textarea 
                id="noteContent" 
                rows="5" 
                placeholder="Write your note content here..." 
                required
                maxlength="1000"
              ></textarea>
              <div class="validation-message" id="contentValidation"></div>
            </div>
            
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Note
              </button>
              <button type="button" id="clearForm" class="btn btn-secondary">
                <i class="fas fa-times"></i> Clear
              </button>
            </div>
          </form>
        </section>
        
        <section class="search-section">
          <h2 class="title-section">
            <i class="fas fa-search"></i> Search Notes
          </h2>
          
          <div class="search-container">
            <div class="search-box-wrapper">
              <i class="fas fa-search search-icon"></i>
              <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="Search notes by title or content..."
              >
              <button type="button" id="clearSearch" class="clear-search-btn" title="Clear search">
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div class="search-stats">
              Found <span id="notesCount">0</span> notes
            </div>
          </div>
        </section>
        
        <section class="notes-section">
          <div class="section-header">
            <h2 class="title-section">
              <i class="fas fa-list"></i> My Notes
            </h2>
            <div class="notes-controls">
              <button id="sortNotes" class="btn btn-sort" title="Sort notes">
                <i class="fas fa-sort-amount-down"></i> Sort
              </button>
              <button id="deleteAllNotes" class="btn btn-danger" title="Delete all notes">
                <i class="fas fa-trash-alt"></i> Delete All
              </button>
            </div>
          </div>
          
          <div class="notes-container" id="notesContainer">
            <div class="empty-state" id="emptyState">
              <div class="empty-icon">
                <i class="fas fa-sticky-note"></i>
              </div>
              <h3>No Notes Yet</h3>
              <p>Your notes will appear here. Start by adding your first note above!</p>
              <button id="addFirstNote" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Your First Note
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>
    
    <footer>
      <div class="container">
        <div class="footer-content">
          <div class="footer-info">
            <h3>
              <i class="fas fa-sticky-note"></i> Notes App
            </h3>
            <p>Keep your thoughts organized and accessible anytime, anywhere.</p>
          </div>
          
          <div class="footer-stats">
            <div class="stat-item">
              <i class="fas fa-notes"></i>
              <span id="totalNotesCount">0</span> Notes
            </div>
            <div class="stat-item">
              <i class="fas fa-font"></i>
              <span id="totalCharacters">0</span> Characters
            </div>
          </div>
          
          <div class="footer-copyright">
            <p>&copy; <span id="currentYear">2026</span> Notes App. All rights reserved.</p>
          </div>
        </div>
      </div>
    </footer>
  </body>
</html>
